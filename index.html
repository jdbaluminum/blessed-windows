<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Contador</title>
<style>
body{font-family:sans-serif;text-align:center;padding:40px;background:#0C447C;color:#fff}
h1{margin-bottom:20px;font-size:18px}
.cd{display:flex;gap:10px;justify-content:center}
.cb{background:rgba(255,255,255,.2);border-radius:8px;padding:10px 16px;min-width:60px}
.cn{font-size:32px;font-weight:700;display:block}
.cl{font-size:11px;opacity:.7}
.sep{font-size:32px;font-weight:700;align-self:center}
</style>
</head>
<body>
<h1>⏳ El especial de agosto comienza en:</h1>
<div class="cd">
  <div class="cb"><span class="cn" id="d">00</span><span class="cl">días</span></div>
  <div class="sep">:</div>
  <div class="cb"><span class="cn" id="h">00</span><span class="cl">horas</span></div>
  <div class="sep">:</div>
  <div class="cb"><span class="cn" id="m">00</span><span class="cl">min</span></div>
  <div class="sep">:</div>
  <div class="cb"><span class="cn" id="s">00</span><span class="cl">seg</span></div>
</div>
<p style="margin-top:20px;opacity:.7;font-size:13px">Comienza: 1 ago 2026 8:00 AM · Termina: 31 ago 2026 4:00 PM</p>

<script>
// Aug 1 2026 8:00 AM Puerto Rico (UTC-4) = 12:00 UTC
var END = new Date('2026-08-01T12:00:00.000Z');
function pad(n){ return String(n).padStart(2,'0'); }
function tick(){
  var diff = Math.max(0, END - Date.now());
  document.getElementById('d').textContent = pad(Math.floor(diff/864e5));
  document.getElementById('h').textContent = pad(Math.floor((diff%864e5)/36e5));
  document.getElementById('m').textContent = pad(Math.floor((diff%36e5)/6e4));
  document.getElementById('s').textContent = pad(Math.floor((diff%6e4)/1e3));
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
